<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Chiller App</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-body">
    <div class="login-container">
        <h1>Control de Chillers</h1>
       <div id="loginForm">
    <input type="text" id="nombre" placeholder="Nombre" autocomplete="off">
    <input type="text" id="apellido" placeholder="Apellido" autocomplete="off">
    <input type="password" id="password" placeholder="Contraseña">
    <button onclick="handleRegister()">Registrarse</button>
    <button onclick="handleLogin()">Iniciar sesión</button>
</div>
    </div>
    <script src="js/auth.js"></script>
    <script>
        function handleLogin() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            if (login(username, password)) {
                window.location.href = 'main.html';
            } else {
                alert('Usuario o contraseña incorrectos');
            }
        }

        function handleRegister() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const nombre = document.getElementById('nombre').value;
            if (!username || !password || !nombre) {
                alert('Completa todos los campos');
                return;
            }
            if (register(username, password, nombre)) {
                alert('Registro exitoso. Ahora inicia sesión.');
            } else {
                alert('El usuario ya existe');
            }
        }
    </script>
</body>

</html>
