<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro Chiller</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="chiller-container">
        <h2 id="chiller-titulo"></h2>
        
        <!-- Pestañas -->
        <div class="tab-bar">
            <button class="tab-button active" data-tab="voltaje">Voltaje</button>
            <button class="tab-button" data-tab="nocturno">Nocturno</button>
            <button class="tab-button" data-tab="diurno">Diurno</button>
        </div>

        <!-- Contenido Voltaje -->
        <div id="voltaje" class="tab-content active">
            <h3>Medición de Voltaje</h3>
            <form id="formVoltaje"></form>
        </div>

        <!-- Contenido Nocturno -->
        <div id="nocturno" class="tab-content">
            <h3>Registro Nocturno</h3>
            <form id="formNocturno"></form>
        </div>

        <!-- Contenido Diurno -->
        <div id="diurno" class="tab-content">
            <h3>Registro Diurno</h3>
            <form id="formDiurno"></form>
        </div>

        <!-- Botones de acción -->
        <div class="action-buttons">
            <button onclick="guardarRegistro()">Guardar</button>
            <button onclick="terminarJornada()">Terminado</button>
        </div>
    </div>

    <script src="libs/xlsx.full.min.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/db.js"></script>
    <script src="js/excel.js"></script>
    <script src="js/ui.js"></script>
</body>
</html>
