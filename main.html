<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seleccionar Chiller</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="main-container">
        <h1>Selecciona un Chiller</h1>
        <div class="chiller-buttons">
            <button class="chiller-btn chiller1" onclick="irAChiller(1)">CHILLER 1</button>
            <button class="chiller-btn chiller3" onclick="irAChiller(3)">CHILLER 3</button>
        </div>
        <button class="logout-btn" onclick="cerrarSesion()">Cerrar sesión</button>
    </div>
    <script src="js/auth.js"></script>
    <script>
        function irAChiller(num) {
            window.location.href = `chiller.html?chiller=${num}`;
        }
        function cerrarSesion() {
            logout();
            window.location.href = 'login.html';
        }
        if (!getCurrentUser()) {
            window.location.href = 'login.html';
        }

        // Preguntar una vez si se quiere descargar la plantilla de Excel al dispositivo
        document.addEventListener('DOMContentLoaded', () => {
            const FLAG_DESCARGA = 'plantilla_chiller_descargada';
            if (!localStorage.getItem(FLAG_DESCARGA)) {
                const quiere = confirm('¿Quieres descargar el archivo de Excel para usarlo en tu móvil y trabajar de forma local?');
                if (quiere) {
                    // Forzar descarga del archivo original de plantilla
                    const a = document.createElement('a');
                    a.href = 'libs/Copia de 01-Check List - Control valores chillers i.xls';
                    a.download = 'Copia de 01-Check List - Control valores chillers i.xls';
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    localStorage.setItem(FLAG_DESCARGA, '1');
                }
            }
        });
    </script>
</body>
</html>
